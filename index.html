<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --accent: #f5c842;
    --accent2: #e8563a;
    --text: #f0ece4;
    --muted: #6b6760;
    --border: #2a2a2a;
    --success: #4ade80;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* ---- SCREENS ---- */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 700px;
    padding: 2rem 1.5rem;
    animation: fadeUp 0.5s ease both;
  }
  .screen.active { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- INTRO ---- */
  .intro-tag {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.25);
    padding: 0.35rem 0.85rem;
    border-radius: 99px;
    margin-bottom: 2rem;
  }

  h1 {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(3rem, 9vw, 5.5rem);
    line-height: 1;
    text-align: center;
    margin-bottom: 1.25rem;
  }
  h1 span { color: var(--accent); }

  .intro-sub {
    color: var(--muted);
    font-size: 1.05rem;
    text-align: center;
    max-width: 420px;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  .btn {
    background: var(--accent);
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 1rem;
    border: none;
    padding: 0.85rem 2.5rem;
    border-radius: 99px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.03em;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,200,66,0.3); }
  .btn:active { transform: translateY(0); }

  /* ---- QUIZ ---- */
  .quiz-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 2.5rem;
  }

  .quiz-step {
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .progress-dots {
    display: flex;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .dot.active { background: var(--accent); }
  .dot.done   { background: var(--success); }

  .quiz-question {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    text-align: center;
    margin-bottom: 0.6rem;
    line-height: 1.2;
  }

  .quiz-hint {
    color: var(--muted);
    font-size: 0.88rem;
    margin-bottom: 2.5rem;
    text-align: center;
  }

  /* ---- DRAG ZONE ---- */
  .drop-zone {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 1.5rem;
    min-height: 60px;
    position: relative;
  }

  .phrase-item {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    cursor: grab;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s, background 0.2s;
    font-size: 1rem;
    font-weight: 400;
  }
  .phrase-item:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }
  .phrase-item.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }
  .phrase-item.drag-over {
    border-color: var(--accent);
    background: rgba(245,200,66,0.07);
  }
  .phrase-item.correct {
    border-color: var(--success);
    background: rgba(74,222,128,0.08);
    color: var(--success);
    cursor: default;
    animation: correctPop 0.4s ease;
  }
  .phrase-item.incorrect-shake {
    animation: shake 0.4s ease;
    border-color: var(--accent2);
  }

  @keyframes correctPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%  { transform: translateX(-8px); }
    40%  { transform: translateX(8px); }
    60%  { transform: translateX(-6px); }
    80%  { transform: translateX(6px); }
  }

  .drag-handle {
    color: var(--muted);
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .item-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem;
    color: var(--muted);
    flex-shrink: 0;
    font-weight: 500;
  }

  .status-msg {
    height: 1.4rem;
    font-size: 0.88rem;
    color: var(--accent2);
    text-align: center;
    margin-bottom: 0.5rem;
    transition: opacity 0.3s;
  }

  /* ---- SUCCESS SCREEN ---- */
  .success-icon {
    font-size: 5rem;
    margin-bottom: 1.5rem;
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pop {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .success-title {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(2.5rem, 8vw, 4rem);
    text-align: center;
    margin-bottom: 1rem;
    line-height: 1.1;
  }
  .success-title span { color: var(--accent); }
  .success-sub {
    color: var(--muted);
    text-align: center;
    margin-bottom: 2rem;
    line-height: 1.6;
  }
  .phrases-recap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 2.5rem;
  }
  .recap-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1.2rem;
    font-size: 0.9rem;
    color: var(--muted);
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }
  .recap-num { color: var(--accent); font-weight: 500; flex-shrink: 0; }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 2px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
    padding: 0.7rem 1.8rem;
    border-radius: 99px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 0.75rem;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

</style>
</head>
<body>

<!-- INTRO SCREEN -->
<div class="screen active" id="screen-intro">
  <div class="intro-tag">Memory Check</div>
  <h1>Did you<br><span>remember?</span></h1>
  <p class="intro-sub">Three phrases. Three chances to prove your memory is as sharp as you think it is.</p>
  <button class="btn" onclick="startQuiz()">Begin the Quiz →</button>
</div>

<!-- QUIZ SCREENS (generated by JS) -->
<div class="screen" id="screen-quiz">
  <div class="quiz-meta">
    <span class="quiz-step" id="step-label">Phrase 1 of 3</span>
    <div class="progress-dots" id="progress-dots">
      <div class="dot active" id="dot-0"></div>
      <div class="dot" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
    </div>
  </div>
  <div class="quiz-question" id="quiz-question">Rearrange the items into the correct order.</div>
  <p class="quiz-hint">Drag and drop the cards below ↓</p>
  <div class="drop-zone" id="drop-zone"></div>
  <div class="status-msg" id="status-msg"></div>
</div>

<!-- SUCCESS SCREEN -->
<div class="screen" id="screen-success">
  <div class="success-icon">🎉</div>
  <div class="success-title">Memory<br><span>Verified!</span></div>
  <p class="success-sub">You nailed all three phrases. Here's what you remembered:</p>
  <div class="phrases-recap" id="phrases-recap"></div>
  <button class="btn" onclick="restartQuiz()">Try Again</button>
  <button class="btn-outline" onclick="restartQuiz()">Reset</button>
</div>

<script>
  const PHRASES = [
    {
      question: "What's the first phrase?",
      items: ["a loaf of bread", "a container of milk", "a stick of butter"]
    },
    {
      question: "What's the second phrase?",
      items: ["A loaf of milk", "a container of bread", "and a joe dirt DVD"]
    },
    {
      question: "What's the third phrase?",
      items: ["A joe dirt DVD", "Scarlett Johansson", "and treasure from a fish tank"]
    }
  ];

  let currentPhrase = 0;
  let shuffledItems = [];
  let dragSrcIndex = null;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    // Make sure it's never in correct order
    const correct = PHRASES[currentPhrase].items;
    const isCorrect = a.every((v, i) => v === correct[i]);
    return isCorrect ? shuffle(arr) : a;
  }

  function startQuiz() {
    currentPhrase = 0;
    showScreen('screen-quiz');
    loadPhrase();
  }

  function loadPhrase() {
    const phrase = PHRASES[currentPhrase];
    shuffledItems = shuffle(phrase.items);

    document.getElementById('step-label').textContent = `Phrase ${currentPhrase + 1} of ${PHRASES.length}`;
    document.getElementById('quiz-question').textContent = phrase.question;
    document.getElementById('status-msg').textContent = '';

    // Update dots
    for (let i = 0; i < 3; i++) {
      const dot = document.getElementById(`dot-${i}`);
      dot.className = 'dot';
      if (i < currentPhrase) dot.classList.add('done');
      else if (i === currentPhrase) dot.classList.add('active');
    }

    renderItems();
  }

  function renderItems() {
    const zone = document.getElementById('drop-zone');
    zone.innerHTML = '';

    shuffledItems.forEach((text, index) => {
      const el = document.createElement('div');
      el.className = 'phrase-item';
      el.draggable = true;
      el.dataset.index = index;
      el.innerHTML = `
        <span class="drag-handle">⠿</span>
        <span class="item-num">${index + 1}</span>
        <span>${text}</span>
      `;

      // Desktop drag events
      el.addEventListener('dragstart', onDragStart);
      el.addEventListener('dragover', onDragOver);
      el.addEventListener('dragleave', onDragLeave);
      el.addEventListener('drop', onDrop);
      el.addEventListener('dragend', onDragEnd);

      // Touch events
      el.addEventListener('touchstart', onTouchStart, { passive: true });
      el.addEventListener('touchmove', onTouchMove, { passive: false });
      el.addEventListener('touchend', onTouchEnd);

      zone.appendChild(el);
    });
  }

  // ---- Desktop Drag ----
  function onDragStart(e) {
    dragSrcIndex = parseInt(this.dataset.index);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    this.classList.add('drag-over');
  }
  function onDragLeave() {
    this.classList.remove('drag-over');
  }
  function onDrop(e) {
    e.stopPropagation();
    const targetIndex = parseInt(this.dataset.index);
    if (dragSrcIndex !== targetIndex) {
      [shuffledItems[dragSrcIndex], shuffledItems[targetIndex]] = [shuffledItems[targetIndex], shuffledItems[dragSrcIndex]];
      renderItems();
      checkOrder();
    }
    this.classList.remove('drag-over');
  }
  function onDragEnd() {
    document.querySelectorAll('.phrase-item').forEach(el => {
      el.classList.remove('dragging', 'drag-over');
    });
  }

  // ---- Touch Drag ----
  let touchDragIndex = null;
  let touchClone = null;
  let touchOffsetX = 0;
  let touchOffsetY = 0;

  function onTouchStart(e) {
    touchDragIndex = parseInt(this.dataset.index);
    const touch = e.touches[0];
    const rect = this.getBoundingClientRect();
    touchOffsetX = touch.clientX - rect.left;
    touchOffsetY = touch.clientY - rect.top;

    touchClone = this.cloneNode(true);
    touchClone.style.cssText = `
      position: fixed;
      width: ${rect.width}px;
      left: ${rect.left}px;
      top: ${rect.top}px;
      opacity: 0.85;
      pointer-events: none;
      z-index: 1000;
      transition: none;
      border-color: var(--accent);
      background: var(--card);
    `;
    document.body.appendChild(touchClone);
    this.style.opacity = '0.3';
  }

  function onTouchMove(e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (touchClone) {
      touchClone.style.left = `${touch.clientX - touchOffsetX}px`;
      touchClone.style.top  = `${touch.clientY - touchOffsetY}px`;
    }
  }

  function onTouchEnd(e) {
    if (touchClone) {
      touchClone.remove();
      touchClone = null;
    }
    const touch = e.changedTouches[0];
    const zone = document.getElementById('drop-zone');
    const items = zone.querySelectorAll('.phrase-item');
    items.forEach(item => { item.style.opacity = ''; });

    // Find which item is under the touch point
    let targetIndex = null;
    items.forEach(item => {
      const rect = item.getBoundingClientRect();
      if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
          touch.clientY >= rect.top  && touch.clientY <= rect.bottom) {
        targetIndex = parseInt(item.dataset.index);
      }
    });

    if (targetIndex !== null && targetIndex !== touchDragIndex) {
      [shuffledItems[touchDragIndex], shuffledItems[targetIndex]] = [shuffledItems[targetIndex], shuffledItems[touchDragIndex]];
      renderItems();
      checkOrder();
    }
    touchDragIndex = null;
  }

  // ---- Order Check ----
  function checkOrder() {
    const correct = PHRASES[currentPhrase].items;
    const isCorrect = shuffledItems.every((v, i) => v === correct[i]);

    if (isCorrect) {
      const items = document.querySelectorAll('.phrase-item');
      items.forEach((el, i) => {
        setTimeout(() => el.classList.add('correct'), i * 80);
      });
      document.getElementById('status-msg').style.color = 'var(--success)';
      document.getElementById('status-msg').textContent = '✓ Perfect order!';
      setTimeout(nextPhrase, 1000);
    }
  }

  function nextPhrase() {
    currentPhrase++;
    if (currentPhrase >= PHRASES.length) {
      showSuccess();
    } else {
      loadPhrase();
    }
  }

  function showSuccess() {
    showScreen('screen-success');
    const recap = document.getElementById('phrases-recap');
    recap.innerHTML = '';
    PHRASES.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'recap-item';
      div.innerHTML = `<span class="recap-num">${i + 1}.</span><span>${p.items.join(', ')}</span>`;
      recap.appendChild(div);
    });
  }

  function restartQuiz() {
    currentPhrase = 0;
    showScreen('screen-intro');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active');
    });
    const target = document.getElementById(id);
    target.classList.add('active');
    // re-trigger animation
    target.style.animation = 'none';
    target.offsetHeight;
    target.style.animation = '';
  }
</script>
</body>
</html>
