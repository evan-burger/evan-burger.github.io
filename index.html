<!DOCTYPE html>
<html>
<head>
  <title>Q&A Site</title>
</head>
<body>

<h1>Q&A</h1>

<div id="qa"></div>

<script>
const data = [
  {q: "What is chemistry?", a: "The study of matter."},
  {q: "What is Cu2+?", a: "A copper ion with +2 charge."}
];

const container = document.getElementById("qa");

data.forEach(item => {
  const div = document.createElement("div");
  div.innerHTML = `<h3>${item.q}</h3><p>${item.a}</p>`;
  container.appendChild(div);
});
</script>

</body>
</html>
