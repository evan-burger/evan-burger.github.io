<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger?</title>
</head>
<body>

<div id="screen-intro">
  <h1></h1>
  <img src=doesheknow.jpg>
  <p>lock in gng</p>
  <button onclick="startQuiz()">bet</button>
</div>

<div id="screen-quiz" style="display:none">
  <p id="step-label"></p>
  <h2 id="quiz-question"></h2>
  <p>drag</p>
  <div id="drop-zone"></div>
  <p id="status-msg"></p>
</div>

<div id="screen-success" style="display:none">
  <h1>u smart twin</h1>
  <p>answers:</p>
  <ol id="phrases-recap"></ol>
  <br>
  <button onclick="restartQuiz()">Try Again</button>
</div>

<script>
  const PHRASES = [
    {
      question: "yeah",
      items: ["a loaf of bread", "a container of milk", "a stick of butter"]
    },
    {
      question: "uhuh",
      items: ["A loaf of milk", "a container of bread", "and a joe dirt DVD"]
    },
    {
      question: "yes please",
      items: ["A joe dirt DVD", "Scarlett Johansson", "and treasure from a fish tank"]
    }
  ];

  let currentPhrase = 0;
  let shuffledItems = [];
  let dragSrcIndex = null;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    const correct = PHRASES[currentPhrase].items;
    const isCorrect = a.every((v, i) => v === correct[i]);
    return isCorrect ? shuffle(arr) : a;
  }

  function showScreen(id) {
    ['screen-intro','screen-quiz','screen-success'].forEach(s => {
      document.getElementById(s).style.display = 'none';
    });
    document.getElementById(id).style.display = 'block';
  }

  function startQuiz() {
    currentPhrase = 0;
    showScreen('screen-quiz');
    loadPhrase();
  }

  function loadPhrase() {
    const phrase = PHRASES[currentPhrase];
    shuffledItems = shuffle(phrase.items);
    document.getElementById('step-label').textContent = `Phrase ${currentPhrase + 1} of ${PHRASES.length}`;
    document.getElementById('quiz-question').textContent = phrase.question;
    document.getElementById('status-msg').textContent = '';
    renderItems();
  }

  function renderItems() {
    const zone = document.getElementById('drop-zone');
    zone.innerHTML = '';
    shuffledItems.forEach((text, index) => {
      const el = document.createElement('div');
      el.draggable = true;
      el.dataset.index = index;
      el.textContent = text;
      el.style.border = '1px solid black';
      el.style.padding = '6px';
      el.style.marginBottom = '4px';
      el.style.cursor = 'grab';
      el.style.background = 'white';
      el.style.width = 'fit-content';

      el.addEventListener('dragstart', function() {
        dragSrcIndex = parseInt(this.dataset.index);
      });
      el.addEventListener('dragover', function(e) { e.preventDefault(); });
      el.addEventListener('drop', function() {
        const targetIndex = parseInt(this.dataset.index);
        if (dragSrcIndex !== targetIndex) {
          [shuffledItems[dragSrcIndex], shuffledItems[targetIndex]] = [shuffledItems[targetIndex], shuffledItems[dragSrcIndex]];
          renderItems();
          checkOrder();
        }
      });

      // Touch support
      el.addEventListener('touchstart', onTouchStart, { passive: true });
      el.addEventListener('touchmove', onTouchMove, { passive: false });
      el.addEventListener('touchend', onTouchEnd);

      zone.appendChild(el);
    });
  }

  // Touch drag
  let touchDragIndex = null;
  let touchClone = null;
  let touchOffsetX = 0, touchOffsetY = 0;

  function onTouchStart(e) {
    touchDragIndex = parseInt(this.dataset.index);
    const touch = e.touches[0];
    const rect = this.getBoundingClientRect();
    touchOffsetX = touch.clientX - rect.left;
    touchOffsetY = touch.clientY - rect.top;
    touchClone = this.cloneNode(true);
    touchClone.style.position = 'fixed';
    touchClone.style.width = rect.width + 'px';
    touchClone.style.left = rect.left + 'px';
    touchClone.style.top = rect.top + 'px';
    touchClone.style.opacity = '0.7';
    touchClone.style.pointerEvents = 'none';
    touchClone.style.zIndex = '1000';
    document.body.appendChild(touchClone);
    this.style.opacity = '0.3';
  }

  function onTouchMove(e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (touchClone) {
      touchClone.style.left = (touch.clientX - touchOffsetX) + 'px';
      touchClone.style.top  = (touch.clientY - touchOffsetY) + 'px';
    }
  }

  function onTouchEnd(e) {
    if (touchClone) { touchClone.remove(); touchClone = null; }
    document.querySelectorAll('#drop-zone div').forEach(el => el.style.opacity = '');
    const touch = e.changedTouches[0];
    let targetIndex = null;
    document.querySelectorAll('#drop-zone div').forEach(el => {
      const rect = el.getBoundingClientRect();
      if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
          touch.clientY >= rect.top  && touch.clientY <= rect.bottom) {
        targetIndex = parseInt(el.dataset.index);
      }
    });
    if (targetIndex !== null && targetIndex !== touchDragIndex) {
      [shuffledItems[touchDragIndex], shuffledItems[targetIndex]] = [shuffledItems[targetIndex], shuffledItems[touchDragIndex]];
      renderItems();
      checkOrder();
    }
    touchDragIndex = null;
  }

  function checkOrder() {
    const correct = PHRASES[currentPhrase].items;
    const isCorrect = shuffledItems.every((v, i) => v === correct[i]);
    if (isCorrect) {
      document.getElementById('status-msg').textContent = 'Correct!';
      setTimeout(() => {
        currentPhrase++;
        if (currentPhrase >= PHRASES.length) {
          showSuccess();
        } else {
          loadPhrase();
        }
      }, 800);
    }
  }

  function showSuccess() {
    showScreen('screen-success');
    const recap = document.getElementById('phrases-recap');
    recap.innerHTML = '';
    PHRASES.forEach(p => {
      const li = document.createElement('li');
      li.textContent = p.items.join(', ');
      recap.appendChild(li);
    });
  }

  function restartQuiz() {
    currentPhrase = 0;
    showScreen('screen-intro');
  }
</script>
</body>
</html>
